<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>crud Gemini</title>
</head>
<body>
    <h1>CRUD Gemini</h1>
    <p>Welcome to the CRUD Gemini application! u can interact with google gemini and get responses.</p>
    <p>To get started message hi !</p>


    <form id="chat-form">
        <label for="message">Enter your message:</label>
        <input type="text" id="message" name="message">
        <button type="submit">Send</button>
    </form>
    <p id="result"></p>
    <script>
        const API_KEY = "YOUR_API_KEY";
        const form = document.getElementById("chat-form");
        const messageInput = document.getElementById("message");
        const result = document.getElementById("result");

        form.addEventListener("submit", async (event) => {
            event.preventDefault();

            const userText = messageInput.value.trim();

            if (!userText) {
                result.textContent = "Please enter a message.";
                return;
            }

            result.textContent = "Loading...";

            try {
                const response = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({
                            contents: [
                                {
                                    parts: [{ text: userText }],
                                },
                            ],
                        }),
                    }
                );

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error?.message || "Request failed.");
                }

                const reply =
                    data.candidates?.[0]?.content?.parts?.[0]?.text ||
                    "No response received.";

                result.textContent = reply;
            } catch (error) {
                result.textContent = `Error: ${error.message}`;
            }
        });
    </script>
</body>
</html>
